<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lynx Boosting Services</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
background:#071426;
color:white;
overflow-x:hidden;
transition:0.4s;
}

body.light{
background:#f4f4f4;
color:black;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.header{
text-align:center;
font-size:30px;
font-weight:800;
padding:20px;
color:#ff8800;
text-shadow:0 0 20px #ff6a00;
}

/* CATEGORY */
.category{
margin:20px;
padding:25px;
border-radius:25px;
background:rgba(12,31,56,0.6);
backdrop-filter:blur(10px);
border:2px solid #ff6a00;
box-shadow:0 0 20px rgba(255,106,0,0.4);
transition:0.4s;
position:relative;
}

.category.active{
box-shadow:0 0 40px #ff6a00;
}

.category h2{
color:#ffae00;
}

/* 🔥 PROMO STYLE */
.promo{
border:2px solid #ff0077;
box-shadow:0 0 25px #ff0077, 0 0 50px #ff00aa;
animation:promoGlow 2s infinite alternate;
}

@keyframes promoGlow{
from{box-shadow:0 0 15px #ff0077;}
to{box-shadow:0 0 40px #ff00aa;}
}

.badge{
position:absolute;
top:-12px;
right:-12px;
background:linear-gradient(45deg,#ff0000,#ff9900);
padding:6px 12px;
border-radius:20px;
font-size:11px;
font-weight:bold;
box-shadow:0 0 15px red;
animation:badgePulse 1.5s infinite;
}

@keyframes badgePulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.view-btn{
margin-top:15px;
padding:6px 18px;
border-radius:20px;
border:2px solid #ff6a00;
background:black;
color:#ffae00;
cursor:pointer;
font-size:12px;
}

.services{display:none;margin-top:15px;}

.service-item{
background:#081a30;
margin:8px 0;
padding:10px;
border-radius:10px;
border:1px solid #ff6a00;
display:flex;
justify-content:space-between;
align-items:center;
opacity:0;
transform:translateY(20px);
animation:fadeUp 0.5s forwards;
}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

.contact{
margin:20px;
padding:25px;
border-radius:20px;
border:2px solid #ff6a00;
box-shadow:0 0 20px #ff6a00;
}

.order-btn{
margin-top:10px;
padding:10px 25px;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#ff6a00,#ffae00);
cursor:pointer;
}

.note{
margin:20px;
padding:20px;
border-radius:20px;
border:2px solid #ff00aa;
box-shadow:0 0 20px #ff00aa;
text-align:center;
}

.toggle-mode{
position:fixed;
top:20px;
right:20px;
padding:8px 15px;
border-radius:20px;
border:2px solid #ff6a00;
cursor:pointer;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="toggle-mode" onclick="toggleMode()">🌙 Mode</div>

<div class="header">LYNX BOOSTING SERVICES</div>

<div id="categories"></div>

<div class="contact">
<h3>CONTACT INFORMATION</h3>
<p>Telegram: @Lynx_0313</p>
<a href="https://www.facebook.com/profile.php?id=615558183964" target="_blank">
<button class="order-btn">ORDER NOW</button>
</a>
</div>

<div class="note">
<h3>IMPORTANT NOTE</h3>
<p>Fast and legit boosting services that are 100% safe. Open 24/7.</p>
</div>

<script>
let data = {

facebook_promo:[
{name:"10,000 Page Followers",price:"₱ 180"},
{name:"10,000 Profile Followers",price:"₱ 190"},
{name:"10,000 Reel Views",price:"₱ 250"},
{name:"10,000 Video Views",price:"₱ 280"},
{name:"Content Monetization Promo",price:"₱ 1,399"}
],

facebook:[
{name:"1,000 Page Followers",price:"₱ 40"},
{name:"1,000 Profile Followers",price:"₱ 45"},
{name:"1,000 Reel Views",price:"₱ 30"},
{name:"1,000 Video Views",price:"₱ 38"},
{name:"1,000 Post Reaction",price:"₱ 30"},
{name:"1,000 Share Post",price:"₱ 40"},
{name:"100 Star Sending",price:"₱ 70"},
{name:"1,000 Star Sending",price:"₱ 700"},
{name:"Content Monetization (CM) 10K Followers + 150K Views",price:"₱ 2,000"}
],

instagram:[
{name:"1,000 Followers",price:"₱ 45"},
{name:"1,000 Instagram Likes",price:"₱ 30"}
],

tiktok:[
{name:"1,000 Followers",price:"₱ 50"}
]

};

function render(){
let container=document.getElementById("categories");
container.innerHTML="";

for(let cat in data){

let isPromo = cat === "facebook_promo";

let div=document.createElement("div");
div.className="category";
if(isPromo) div.classList.add("promo");

div.innerHTML=`
<h2>${cat.replace("_"," ").toUpperCase()} CATEGORY</h2>
${isPromo ? '<div class="badge">LIMITED PROMO</div>' : ''}
<button class="view-btn" onclick="toggleServices(this)">CLICK HERE TO VIEW SERVICES</button>
<div class="services"></div>
`;

container.appendChild(div);

let servicesDiv=div.querySelector(".services");

data[cat].forEach((item,i)=>{
let service=document.createElement("div");
service.className="service-item";
service.style.animationDelay=i*0.1+"s";
service.innerHTML=`<span>${item.name} - ${item.price}</span>`;
servicesDiv.appendChild(service);
});
}
}

function toggleServices(btn){
document.querySelectorAll(".services").forEach(s=>s.style.display="none");
document.querySelectorAll(".category").forEach(c=>c.classList.remove("active"));

let parent=btn.parentElement;
let services=parent.querySelector(".services");
services.style.display="block";
parent.classList.add("active");
}

function toggleMode(){
document.body.classList.toggle("light");
}

/* PARTICLES */
let canvas=document.getElementById("particles");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:2});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#ff6a00";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=0.3;
if(p.y>canvas.height)p.y=0;
});
requestAnimationFrame(animate);
}
animate();

render();
</script>

</body>
</html>
