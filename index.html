<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lynx Boosting Services</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
background:#071426;
color:white;
overflow-x:hidden;
}

/* PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* HEADER */
.header{
text-align:center;
font-size:30px;
font-weight:800;
padding:20px;
color:#ff8800;
text-shadow:0 0 20px #ff6a00;
}

/* CATEGORY */
.category{
margin:20px;
padding:25px;
border-radius:25px;
background:rgba(12,31,56,0.6);
backdrop-filter:blur(10px);
border:2px solid #ff6a00;
box-shadow:0 0 20px rgba(255,106,0,0.4);
}

.category h2{color:#ffae00;}

.view-btn{
margin-top:15px;
padding:6px 18px;
border-radius:20px;
border:2px solid #ff6a00;
background:black;
color:#ffae00;
cursor:pointer;
font-size:12px;
}

.services{display:none;margin-top:15px;}

.service-item{
background:#081a30;
margin:8px 0;
padding:10px;
border-radius:10px;
border:1px solid #ff6a00;
display:flex;
justify-content:space-between;
align-items:center;
opacity:0;
transform:translateY(20px);
animation:fadeUp 0.5s forwards;
}

@keyframes fadeUp{
to{opacity:1;transform:translateY(0);}
}

.delete-btn{
background:red;
border:none;
padding:4px 8px;
border-radius:6px;
cursor:pointer;
color:white;
font-size:11px;
margin-left:8px;
}

/* CONTACT */
.contact{
margin:20px;
padding:25px;
border-radius:20px;
border:2px solid #ff6a00;
box-shadow:0 0 20px #ff6a00;
}

.order-btn{
margin-top:10px;
padding:10px 25px;
border:none;
border-radius:25px;
background:linear-gradient(90deg,#ff6a00,#ffae00);
cursor:pointer;
}

/* NOTE */
.note{
margin:20px;
padding:20px;
border-radius:20px;
border:2px solid #ff00aa;
box-shadow:0 0 20px #ff00aa;
text-align:center;
}

/* ADMIN LOGIN */
.admin-login{
text-align:center;
margin:20px;
padding:10px;
border:2px solid #ff6a00;
border-radius:20px;
cursor:pointer;
}

/* ADMIN PANEL */
.admin-panel{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
overflow:auto;
padding:30px;
}

.admin-box{
background:#0c1f38;
padding:20px;
border-radius:15px;
border:2px solid #ff6a00;
margin-bottom:20px;
}

input,select{
width:100%;
padding:8px;
margin:5px 0;
border-radius:8px;
border:none;
}

.save-btn{
background:#ff6a00;
padding:8px;
border:none;
border-radius:10px;
cursor:pointer;
}

.close-btn{
background:red;
color:white;
padding:6px 15px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="header">LYNX BOOSTING SERVICES</div>
<div id="categories"></div>

<div class="contact">
<h3>CONTACT INFORMATION</h3>
<p>Telegram: @Lynx_0313</p>
<a href="https://www.facebook.com/profile.php?id=615558183964" target="_blank">
<button class="order-btn">ORDER NOW</button>
</a>
</div>

<div class="note">
<h3>IMPORTANT NOTE</h3>
<p>Fast and legit boosting services that are 100% safe. Open 24/7.</p>
</div>

<div class="admin-login" onclick="openAdmin()">ADMIN LOGIN</div>

<div class="admin-panel" id="adminPanel">
<div class="admin-box">
<h3>ADD CATEGORY</h3>
<input type="text" id="newCategory" placeholder="New Category Name">
<button class="save-btn" onclick="addCategory()">ADD CATEGORY</button>
</div>

<div class="admin-box">
<h3>ADD SERVICE</h3>
<select id="categorySelect"></select>
<input type="text" id="serviceName" placeholder="Service Name">
<input type="text" id="servicePrice" placeholder="Price">
<button class="save-btn" onclick="addService()">ADD SERVICE</button>
</div>

<button class="close-btn" onclick="closeAdmin()">CLOSE</button>
</div>

<script>

let isAdmin=false;
let adminPass="1234";

let data=JSON.parse(localStorage.getItem("servicesData"))||{
facebook:[
{name:"1,000 Page Followers",price:"₱ 34"},
{name:"5,000 Page Followers",price:"₱ 160"},
{name:"10,000 Page Followers",price:"₱ 190"}
],
instagram:[
{name:"1,000 Followers",price:"₱ 45"}
],
tiktok:[
{name:"1,000 Followers",price:"₱ 50"}
]
};

function save(){localStorage.setItem("servicesData",JSON.stringify(data));}

function render(){
let container=document.getElementById("categories");
container.innerHTML="";
document.getElementById("categorySelect").innerHTML="";

for(let cat in data){

document.getElementById("categorySelect").innerHTML+=
`<option value="${cat}">${cat}</option>`;

let div=document.createElement("div");
div.className="category";

let deleteCatBtn=isAdmin?`<button class="delete-btn" onclick="deleteCategory('${cat}')">Delete Category</button>`:"";

div.innerHTML=`
<h2>${cat.toUpperCase()} CATEGORY ${deleteCatBtn}</h2>
<button class="view-btn" onclick="toggleServices(this)">CLICK HERE TO VIEW SERVICES</button>
<div class="services"></div>
`;

container.appendChild(div);

let servicesDiv=div.querySelector(".services");

data[cat].forEach((item,i)=>{
let delBtn=isAdmin?`<button class="delete-btn" onclick="deleteService('${cat}',${i})">Delete</button>`:"";

servicesDiv.innerHTML+=`
<div class="service-item">
<span>${item.name} - ${item.price}</span>
${delBtn}
</div>`;
});
}

save();
}

function toggleServices(btn){
document.querySelectorAll(".services").forEach(s=>s.style.display="none");
btn.parentElement.querySelector(".services").style.display="block";
}

function deleteService(cat,i){
if(confirm("Delete this service?")){
data[cat].splice(i,1);
render();
}
}

function deleteCategory(cat){
if(confirm("Delete entire category?")){
delete data[cat];
render();
}
}

function addCategory(){
let name=document.getElementById("newCategory").value;
if(name){
data[name.toLowerCase()]=[];
render();
}
}

function addService(){
let cat=document.getElementById("categorySelect").value;
let name=document.getElementById("serviceName").value;
let price=document.getElementById("servicePrice").value;
if(name&&price){
data[cat].push({name,price});
render();
}
}

function openAdmin(){
let pass=prompt("Enter Admin Password:");
if(pass===adminPass){
isAdmin=true;
document.getElementById("adminPanel").style.display="block";
render();
}else{alert("Wrong Password");}
}

function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}

/* PARTICLES */
let canvas=document.getElementById("particles");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:2});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#ff6a00";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=0.3;
if(p.y>canvas.height)p.y=0;
});
requestAnimationFrame(animate);
}
animate();

render();
</script>

</body>
</html>
